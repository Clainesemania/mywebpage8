<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>CLAINE — BLUEPRINT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@100;200;300;400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Oxanium:wght@200;300;400;600&display=swap" rel="stylesheet">
  <style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root{
    --navy:    #07102a;
    --deep:    #050d1f;
    --line:    rgba(147,197,253,.12);
    --line-hi: rgba(147,197,253,.35);
    --blue:    #93c5fd;
    --amber:   #fbbf24;
    --white:   #e8f4fd;
    --muted:   rgba(232,244,253,.4);
    --dim:     rgba(232,244,253,.2);
    --ease:    cubic-bezier(.77,0,.175,1);
    --spring:  cubic-bezier(.16,1,.3,1);
  }

  html,body{
    width:100%;height:100%;overflow:hidden;
    background:var(--navy);
    color:var(--white);
    font-family:'Oxanium',sans-serif;
    cursor:none;
  }

  /* ══════════════════════════════════
     CANVAS BLUEPRINT GRID
  ══════════════════════════════════ */
  #grid-canvas{
    position:fixed;inset:0;z-index:0;
    pointer-events:none;
    opacity:1;
  }

  /* ══════════════════════════════════
     CURSOR — TECHNICAL RETICLE
  ══════════════════════════════════ */
  #reticle{
    position:fixed;z-index:9999;
    width:28px;height:28px;
    transform:translate(-50%,-50%);
    pointer-events:none;
    transition:width .25s var(--spring),height .25s var(--spring);
  }
  .ret-ring{
    position:absolute;inset:0;
    border:1px solid var(--amber);
    border-radius:50%;
    opacity:.8;
    transition:opacity .25s;
  }
  .ret-cross::before,.ret-cross::after{
    content:'';position:absolute;
    background:var(--amber);opacity:.7;
  }
  .ret-cross::before{
    width:1px;height:100%;left:50%;top:0;
    transform:translateX(-50%);
  }
  .ret-cross::after{
    width:100%;height:1px;top:50%;left:0;
    transform:translateY(-50%);
  }
  .ret-dot{
    position:absolute;
    width:3px;height:3px;
    background:var(--amber);
    border-radius:50%;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
  }
  #ret-coords{
    position:fixed;z-index:9999;
    font-family:'Space Mono',monospace;
    font-size:.5rem;
    color:var(--amber);
    pointer-events:none;
    opacity:.8;
    transform:translate(14px,-14px);
    white-space:nowrap;
    letter-spacing:.05em;
  }
  body.hov #reticle{width:44px;height:44px;}
  body.hov .ret-ring{border-color:var(--blue);opacity:1;}
  body.hov .ret-cross::before,
  body.hov .ret-cross::after{background:var(--blue);}
  body.hov .ret-dot{background:var(--blue);}
  body.hov #ret-coords{color:var(--blue);}

  /* ══════════════════════════════════
     FIXED CHROME
  ══════════════════════════════════ */
  /* Top bar */
  #topbar{
    position:fixed;top:0;left:0;right:0;height:38px;
    border-bottom:1px solid var(--line-hi);
    z-index:500;
    display:flex;align-items:center;
    background:rgba(5,13,31,.9);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
  }
  .tb-cell{
    display:flex;align-items:center;
    padding:0 1.2rem;
    border-right:1px solid var(--line-hi);
    height:100%;
    font-family:'Space Mono',monospace;
    font-size:.52rem;
    letter-spacing:.15em;
    text-transform:uppercase;
  }
  .tb-cell.brand{
    font-family:'Big Shoulders Display',sans-serif;
    font-size:1rem;
    font-weight:300;
    letter-spacing:.25em;
    color:var(--white);
    gap:.5rem;
  }
  .brand-dot{
    width:5px;height:5px;
    border-radius:50%;
    background:var(--amber);
    box-shadow:0 0 8px var(--amber);
    animation:amberpulse 2s ease-in-out infinite;
  }
  @keyframes amberpulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  .tb-cell.flex-grow{flex:1;border-right:none;justify-content:flex-end;}
  .tb-label{color:var(--muted);}
  .tb-val{color:var(--blue);margin-left:.4rem;}

  /* Left rule */
  #left-rule{
    position:fixed;top:38px;left:0;bottom:28px;
    width:38px;
    border-right:1px solid var(--line-hi);
    z-index:200;
    background:rgba(5,13,31,.7);
    display:flex;flex-direction:column;
    align-items:center;
    padding:1rem 0;
    gap:0;
  }
  .lr-tick{
    width:100%;
    border-bottom:1px solid var(--line);
    height:40px;
    display:flex;align-items:flex-end;justify-content:center;
    padding-bottom:3px;
  }
  .lr-num{
    font-family:'Space Mono',monospace;
    font-size:.42rem;
    color:var(--dim);
    letter-spacing:.05em;
    writing-mode:horizontal-tb;
  }
  /* Nav dots on left rule */
  .lr-dot{
    position:relative;
    width:100%;height:60px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:background .25s;
  }
  .lr-dot::before{
    content:'';
    width:6px;height:6px;
    border-radius:50%;
    border:1px solid var(--line-hi);
    background:transparent;
    transition:background .3s,border-color .3s,box-shadow .3s,transform .3s var(--spring);
  }
  .lr-dot.act::before{
    background:var(--amber);
    border-color:var(--amber);
    box-shadow:0 0 12px var(--amber);
    transform:scale(1.4);
  }
  .lr-dot:hover:not(.act)::before{
    background:rgba(147,197,253,.3);
    border-color:var(--blue);
  }

  /* Bottom bar */
  #botbar{
    position:fixed;bottom:0;left:0;right:0;height:28px;
    border-top:1px solid var(--line-hi);
    z-index:500;
    background:rgba(5,13,31,.9);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    display:flex;align-items:center;
    padding:0 1.2rem;
    gap:2rem;
  }
  .bb-item{
    font-family:'Space Mono',monospace;
    font-size:.48rem;
    letter-spacing:.15em;
    color:var(--dim);
  }
  .bb-item b{color:var(--blue);}
  .bb-sep{color:var(--line-hi);}

  /* ══════════════════════════════════
     SECTION ENGINE
  ══════════════════════════════════ */
  .sec{
    position:fixed;
    top:38px;left:38px;right:0;bottom:28px;
    display:flex;align-items:center;justify-content:center;
    z-index:10;
    transition:opacity .8s var(--ease),transform .8s var(--ease);
    will-change:opacity,transform;
  }
  .sec.active {opacity:1;transform:translateY(0);  pointer-events:all;}
  .sec.hide-up{opacity:0;transform:translateY(-45px);pointer-events:none;}
  .sec.hide-dn{opacity:0;transform:translateY(45px); pointer-events:none;}

  /* stagger children */
  .sec.active .d1{animation:drawIn .6s var(--spring) .05s both;}
  .sec.active .d2{animation:drawIn .6s var(--spring) .13s both;}
  .sec.active .d3{animation:drawIn .6s var(--spring) .21s both;}
  .sec.active .d4{animation:drawIn .6s var(--spring) .29s both;}
  .sec.active .d5{animation:drawIn .6s var(--spring) .37s both;}
  .sec.active .d6{animation:drawIn .6s var(--spring) .45s both;}
  .sec.active .d7{animation:drawIn .6s var(--spring) .53s both;}
  @keyframes drawIn{
    from{opacity:0;transform:translateY(18px);}
    to  {opacity:1;transform:translateY(0);}
  }

  /* ══════════════════════════════════
     BLUEPRINT DECORATION HELPERS
  ══════════════════════════════════ */
  /* corner mark */
  .bp-corner{
    position:absolute;
    width:16px;height:16px;
    pointer-events:none;
  }
  .bp-corner.tl{top:0;left:0;
    border-top:1px solid var(--amber);
    border-left:1px solid var(--amber);}
  .bp-corner.tr{top:0;right:0;
    border-top:1px solid var(--amber);
    border-right:1px solid var(--amber);}
  .bp-corner.bl{bottom:0;left:0;
    border-bottom:1px solid var(--amber);
    border-left:1px solid var(--amber);}
  .bp-corner.br{bottom:0;right:0;
    border-bottom:1px solid var(--amber);
    border-right:1px solid var(--amber);}

  /* thin rule with label */
  .bp-rule{
    display:flex;align-items:center;gap:.7rem;
    margin-bottom:1rem;
  }
  .bp-rule-line{
    flex:0 0 28px;height:1px;
    background:var(--amber);
  }
  .bp-rule-text{
    font-family:'Space Mono',monospace;
    font-size:.5rem;letter-spacing:.25em;text-transform:uppercase;
    color:var(--amber);
  }

  /* callout annotation */
  .annotation{
    display:inline-flex;align-items:center;gap:.4rem;
    font-family:'Space Mono',monospace;
    font-size:.45rem;letter-spacing:.15em;text-transform:uppercase;
    color:var(--muted);
  }
  .annotation::before{
    content:'';display:block;
    width:12px;height:1px;background:var(--muted);
  }

  /* ══════════════════════════════════
     S1 — HERO
  ══════════════════════════════════ */
  .hero-wrap{
    width:min(1100px,93%);
    position:relative;
  }

  /* big coordinate label */
  .hero-coord{
    position:absolute;top:-2rem;right:0;
    font-family:'Space Mono',monospace;
    font-size:.5rem;letter-spacing:.2em;
    color:var(--muted);
    display:flex;align-items:center;gap:.5rem;
  }
  .hero-coord span{color:var(--amber);}

  .hero-top-rule{
    width:100%;height:1px;
    background:linear-gradient(90deg,var(--amber) 20%,var(--line-hi) 100%);
    margin-bottom:1.5rem;
    position:relative;
  }
  .hero-top-rule::before{
    content:'';
    position:absolute;left:0;top:-3px;
    width:7px;height:7px;
    border:1px solid var(--amber);
    background:var(--navy);
  }

  .hero-name{
    font-family:'Big Shoulders Display',sans-serif;
    font-size:clamp(6rem,20vw,17rem);
    font-weight:100;
    line-height:.84;
    letter-spacing:.05em;
    color:var(--white);
    position:relative;
    display:inline-block;
  }
  /* Ghost outline char */
  .hero-name .ghost{
    -webkit-text-stroke:1px rgba(147,197,253,.35);
    color:transparent;
  }
  .hero-name .fill{
    color:var(--white);
  }

  /* dimension line under name */
  .dim-line{
    display:flex;align-items:center;
    margin-top:.5rem;
    gap:0;
  }
  .dim-tick{width:1px;height:12px;background:var(--amber);}
  .dim-rule{flex:1;height:1px;background:var(--line-hi);
    position:relative;
    display:flex;align-items:center;justify-content:center;
  }
  .dim-rule::after{
    content:attr(data-dim);
    font-family:'Space Mono',monospace;
    font-size:.42rem;letter-spacing:.1em;
    color:var(--amber);
    background:var(--navy);
    padding:0 .5rem;
    position:relative;z-index:1;
  }

  .hero-sub-row{
    margin-top:1.8rem;
    display:flex;align-items:flex-start;
    gap:4rem;
  }
  .hero-sub-block{}
  .hsb-label{
    font-family:'Space Mono',monospace;
    font-size:.48rem;letter-spacing:.2em;text-transform:uppercase;
    color:var(--muted);margin-bottom:.4rem;
  }
  .hsb-val{
    font-family:'Oxanium',sans-serif;
    font-size:clamp(.8rem,1.3vw,.95rem);
    font-weight:300;color:var(--white);
  }

  .hero-ver{
    margin-left:auto;
    text-align:right;
  }
  .hero-ver-big{
    font-family:'Big Shoulders Display',sans-serif;
    font-size:clamp(3rem,6vw,5.5rem);
    font-weight:100;
    line-height:1;
    -webkit-text-stroke:1px var(--line-hi);
    color:transparent;
    letter-spacing:.1em;
  }
  .hero-ver-label{
    font-family:'Space Mono',monospace;
    font-size:.45rem;letter-spacing:.2em;
    color:var(--dim);
    margin-top:.3rem;
  }

  /* ══════════════════════════════════
     S2 — ABOUT
  ══════════════════════════════════ */
  .about-frame{
    width:min(980px,92%);
    border:1px solid var(--line-hi);
    position:relative;
    padding:2.5rem;
    display:grid;
    grid-template-columns:1.2fr 1fr;
    gap:3rem;
    align-items:start;
  }
  /* Blueprint corner marks on frame */
  .about-frame .bp-corner{width:12px;height:12px;}

  /* center divider */
  .about-frame::before{
    content:'';
    position:absolute;top:2rem;bottom:2rem;
    left:calc(100% * 1.2/2.2 + 1.5rem);
    width:1px;
    background:var(--line-hi);
  }

  .about-left{}
  .spec-title{
    font-family:'Big Shoulders Display',sans-serif;
    font-size:clamp(3rem,7vw,6rem);
    font-weight:200;
    line-height:.9;
    letter-spacing:.04em;
    color:var(--white);
  }
  .spec-title .accent{
    color:var(--amber);
  }
  .spec-body{
    font-family:'Oxanium',sans-serif;
    font-size:clamp(.78rem,1.1vw,.9rem);
    font-weight:300;
    line-height:1.85;
    color:var(--muted);
    margin-top:1.2rem;
  }

  .spec-table{
    margin-top:1.5rem;
    display:flex;flex-direction:column;
    border-top:1px solid var(--line);
  }
  .spec-row{
    display:grid;
    grid-template-columns:auto 1fr;
    gap:1.2rem;
    padding:.65rem 0;
    border-bottom:1px solid var(--line);
    align-items:baseline;
    transition:background .25s;
  }
  .spec-row:hover{
    background:rgba(147,197,253,.03);
    padding-left:.5rem;
    transition:padding-left .25s var(--spring), background .25s;
  }
  .spec-key{
    font-family:'Space Mono',monospace;
    font-size:.48rem;letter-spacing:.18em;text-transform:uppercase;
    color:var(--amber);
    white-space:nowrap;
  }
  .spec-v{
    font-family:'Oxanium',sans-serif;
    font-size:clamp(.78rem,1.1vw,.9rem);
    font-weight:300;color:var(--white);
  }

  /* right: schematic boxes */
  .schematic{display:flex;flex-direction:column;gap:1rem;}

  .sch-box{
    border:1px solid var(--line-hi);
    padding:1rem 1.2rem;
    position:relative;
    transition:border-color .3s,transform .35s var(--spring);
  }
  .sch-box:hover{
    border-color:var(--amber);
    transform:translateX(5px);
  }
  .sch-num{
    position:absolute;top:-9px;left:10px;
    font-family:'Space Mono',monospace;
    font-size:.42rem;letter-spacing:.15em;
    background:var(--navy);
    padding:0 .4rem;
    color:var(--amber);
  }
  .sch-label{
    font-family:'Space Mono',monospace;
    font-size:.45rem;letter-spacing:.2em;text-transform:uppercase;
    color:var(--muted);margin-bottom:.35rem;
  }
  .sch-val{
    font-family:'Big Shoulders Display',sans-serif;
    font-size:clamp(1.1rem,2.2vw,1.6rem);
    font-weight:200;letter-spacing:.05em;
    color:var(--white);
  }
  .sch-box:hover .sch-val{color:var(--amber);}

  /* ══════════════════════════════════
     S3–S5 — PROJECT SPEC SHEETS
  ══════════════════════════════════ */
  .spec-sheet{
    width:min(1020px,92%);
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:0;
    border:1px solid var(--line-hi);
    position:relative;
  }
  .spec-sheet.flip .ss-img{order:2;}
  .spec-sheet.flip .ss-info{order:1;border-right:1px solid var(--line-hi);border-left:none;}

  .ss-img{
    position:relative;overflow:hidden;
    aspect-ratio:4/3;
    border-right:1px solid var(--line-hi);
  }
  .ss-img img{
    width:100%;height:100%;
    object-fit:cover;display:block;
    filter:grayscale(.75) brightness(.75);
    transition:filter .7s var(--ease),transform .8s var(--ease);
  }
  .ss-img:hover img{
    filter:grayscale(.1) brightness(1);
    transform:scale(1.04);
  }

  /* blueprint overlay on image */
  .ss-img-overlay{
    position:absolute;inset:0;
    pointer-events:none;
    background:
      linear-gradient(rgba(7,16,42,.4) 1px, transparent 1px),
      linear-gradient(90deg,rgba(7,16,42,.4) 1px, transparent 1px);
    background-size:40px 40px;
    opacity:.5;
    transition:opacity .5s;
  }
  .ss-img:hover .ss-img-overlay{opacity:0;}

  /* corner accents on image */
  .ss-img .bp-corner{z-index:2;}

  /* spec number */
  .ss-spec-num{
    position:absolute;bottom:12px;left:12px;
    font-family:'Big Shoulders Display',sans-serif;
    font-size:5rem;font-weight:100;
    color:rgba(232,244,253,.05);
    line-height:1;pointer-events:none;user-select:none;
    letter-spacing:.05em;
  }

  .ss-info{
    padding:2rem 2.2rem;
    display:flex;flex-direction:column;justify-content:space-between;
    border-left:1px solid var(--line-hi);
  }

  .ss-head{margin-bottom:auto;}
  .ss-cat{
    font-family:'Space Mono',monospace;
    font-size:.48rem;letter-spacing:.25em;text-transform:uppercase;
    color:var(--amber);
    margin-bottom:1rem;
    display:flex;align-items:center;gap:.5rem;
  }
  .ss-cat::before{
    content:'';width:14px;height:1px;background:var(--amber);
  }

  .ss-title{
    font-family:'Big Shoulders Display',sans-serif;
    font-size:clamp(2.5rem,5.5vw,4.8rem);
    font-weight:100;
    line-height:.9;
    letter-spacing:.04em;
    color:var(--white);
    margin-bottom:1.2rem;
  }
  .ss-title .hi{
    display:block;
    -webkit-text-stroke:1px var(--blue);
    color:transparent;
  }

  .ss-desc{
    font-family:'Oxanium',sans-serif;
    font-size:clamp(.75rem,1.1vw,.88rem);
    font-weight:300;
    line-height:1.8;
    color:var(--muted);
    margin-bottom:1.8rem;
  }

  .ss-meta{
    display:flex;gap:1.5rem;
    padding:.8rem 0;
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    margin-bottom:1.5rem;
  }
  .meta-item{}
  .meta-key{
    font-family:'Space Mono',monospace;
    font-size:.42rem;letter-spacing:.15em;text-transform:uppercase;
    color:var(--dim);margin-bottom:.25rem;
  }
  .meta-val{
    font-family:'Oxanium',sans-serif;
    font-size:.78rem;font-weight:400;
    color:var(--blue);
  }

  /* CTA */
  .ss-cta{
    display:inline-flex;align-items:center;gap:.7rem;
    font-family:'Space Mono',monospace;
    font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;
    color:var(--navy);
    text-decoration:none;
    padding:.7rem 1.6rem;
    background:var(--amber);
    position:relative;overflow:hidden;
    align-self:flex-start;
    transition:background .3s,color .3s,transform .35s var(--spring);
  }
  .ss-cta::before{
    content:'';
    position:absolute;inset:0;
    background:var(--blue);
    transform:translateX(-101%);
    transition:transform .45s var(--ease));
  }
  .ss-cta:hover{color:var(--navy);transform:translateY(-2px);}
  .ss-cta:hover::before{transform:translateX(0);}
  .ss-cta span,.ss-cta svg{position:relative;z-index:1;}
  .cta-arr{transition:transform .35s var(--spring);}
  .ss-cta:hover .cta-arr{transform:translateX(5px);}

  /* ══════════════════════════════════
     S6 — STILL IMPROVING
  ══════════════════════════════════ */
  .closing-sheet{
    width:min(1000px,92%);
    position:relative;
  }

  .closing-top{
    display:flex;align-items:flex-end;
    gap:3rem;
    padding-bottom:1.8rem;
    border-bottom:1px solid var(--line-hi);
    margin-bottom:1.8rem;
  }

  .closing-headline{
    font-family:'Big Shoulders Display',sans-serif;
    font-size:clamp(4rem,14vw,11rem);
    font-weight:100;
    line-height:.85;
    letter-spacing:.04em;
    color:var(--white);
  }
  .closing-headline .outline{
    display:block;
    -webkit-text-stroke:1px var(--line-hi);
    color:transparent;
  }
  .closing-headline .amber{
    display:block;
    color:var(--amber);
  }

  .closing-right{
    padding-bottom:.5rem;
    flex-shrink:0;
  }
  .closing-sub{
    font-family:'Oxanium',sans-serif;
    font-size:clamp(.8rem,1.2vw,.95rem);
    font-weight:300;
    line-height:1.8;
    color:var(--muted);
    max-width:260px;
  }

  .closing-links-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:0;
    border:1px solid var(--line-hi);
  }
  .cl-item{
    padding:1.4rem 1.5rem;
    border-right:1px solid var(--line-hi);
    position:relative;overflow:hidden;
    transition:background .3s;
    text-decoration:none;
    display:block;
  }
  .cl-item:last-child{border-right:none;}
  .cl-item::before{
    content:'';
    position:absolute;bottom:0;left:0;right:0;height:0;
    background:rgba(251,191,36,.07);
